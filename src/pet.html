<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  padding: 0;
  width: 280px;
  height: 340px;
  background: transparent;
  font-family: sans-serif;
  overflow: hidden;
}

#pet {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  cursor: grab;
  width: 260px;
  user-select: none;
}

#pet .speech {
  background: white;
  padding: 8px 12px;
  border-radius: 15px;
  margin-bottom: 10px;
  opacity: 0;
  transition: opacity 0.3s;
  position: relative;
}

#pet .speech::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 50%;
  transform: translateX(-50%);
  border-left: 8px solid transparent;
  border-right: 8px solid transparent;
  border-top: 8px solid white;
}

#pet .speech.show { opacity: 1; }

#pet .pet-image {
  display: block;
  width: 260px;
  height: 260px;
  object-fit: cover;
  object-position: 50% 46%;
  border-radius: 28px;
  filter: drop-shadow(0 12px 18px rgba(25, 53, 75, 0.28));
  pointer-events: none;
}
</style>
</head>
<body>
<div id="pet">
  <div class="speech" id="speech"></div>
  <img class="pet-image" src="pet-image.png" alt="OpenClaw Robot Pet">
</div>

<script>
const pet = document.getElementById('pet');
const speech = document.getElementById('speech');

// Drag support
let isDragging = false;
let startX, startY;

pet.addEventListener('mousedown', (e) => {
  isDragging = true;
  startX = e.clientX;
  startY = e.clientY;
  pet.style.cursor = 'grabbing';
});

document.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - startX;
  const dy = e.clientY - startY;
  window.electronAPI.dragWindow(dx, dy);
  startX = e.clientX;
  startY = e.clientY;
});

document.addEventListener('mouseup', () => {
  isDragging = false;
  pet.style.cursor = 'grab';
});

// Click handler
pet.addEventListener('click', () => {
  const phrases = ['にゃ〜', 'ぽよ', 'うにゃ', 'ふわっ', 'ぴょ', 'はむ', 'ぎこち', 'ぽこ'];
  showSpeech(phrases[Math.floor(Math.random() * phrases.length)]);
});

function showSpeech(text) {
  speech.textContent = text;
  speech.classList.add('show');
  setTimeout(() => speech.classList.remove('show'), 2000);
}

// Listen for commands from main process
if (window.electronAPI) {
  window.electronAPI.onCommand((data) => {
    if (data.command === 'say') {
      showSpeech(data.text);
    } else if (data.command === 'show') {
      pet.style.display = 'block';
    } else if (data.command === 'hide') {
      pet.style.display = 'none';
    }
  });
}
</script>
</body>
</html>
